# Phase 6 Part 4 (observability): scrape config for the backend's
# hand-rolled /metrics endpoint (see backend/src/infrastructure/observability/metrics.ts).
# Bring the stack up with: docker compose --profile observability up
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "rentit-backend"
    metrics_path: /metrics
    # Matches backend's METRICS_TOKEN env var -- leave both blank in local
    # dev, set a real shared secret before pointing this at production.
    # bearer_token: "replace-with-the-same-value-as-METRICS_TOKEN"
    static_configs:
      - targets: ["backend:4000"]
        labels:
          service: "rentit-backend"
          environment: "development"
