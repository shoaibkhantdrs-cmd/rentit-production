# Phase 6 Part 4 (observability): auto-provisions the Prometheus
# datasource on Grafana startup so there's no manual "Add data source"
# click-through step for a fresh environment.
apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
