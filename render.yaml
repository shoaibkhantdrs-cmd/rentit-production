# Render Blueprint (Infrastructure-as-Code) for the rentit-backend service.
#
# This codifies the settings that otherwise only live in the Render
# dashboard (Root Directory, Build Command, Start Command) so they're
# reviewable and reproducible from the repo. If `rentit-backend` was
# created manually in the dashboard rather than from this blueprint, this
# file does NOT retroactively change that service's settings -- Render
# only applies a blueprint when a service is created via "New +" ->
# "Blueprint", or when you click "Sync" on a service already linked to
# one. To bring an existing manually-created service in line with this
# file, either match these values by hand in Dashboard -> rentit-backend
# -> Settings, or delete and recreate the service from this blueprint.
#
# Deliberately NOT setting NODE_ENV here: Render sets it to "production"
# by default, and the app's own boot guard (backend/src/config/env.ts)
# depends on that to require a real JWT_ACCESS_SECRET. The actual build
# failure this file is part of fixing (npm silently skipping
# devDependencies because of that same NODE_ENV=production) is handled at
# the npm-config level instead, in backend/.npmrc -- so the app still
# gets a correct "production" runtime without npm treating the build step
# as production too.
services:
  - type: web
    name: rentit-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /health/live
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      # Real deployed frontend origin (not a secret -- it's the public
      # site URL). CORS is an explicit allowlist (see env.ts/app.ts), so
      # this must exactly match the frontend's live origin, scheme
      # included, no trailing slash, or every browser request from it
      # gets blocked before your app ever sees it.
      - key: CORS_ORIGIN
        value: https://rentit-frontend-gd1c.onrender.com
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: FRONTEND_BASE_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_ADDRESS
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: METRICS_TOKEN
        sync: false

  # Static frontend. Same caveat as rentit-backend above: this codifies
  # the intended config, but won't retroactively apply to
  # rentit-frontend-gd1c if that service was created manually rather than
  # from this blueprint -- match these settings by hand in Dashboard ->
  # rentit-frontend-gd1c -> Settings if so.
  - type: web
    name: rentit-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      # Build-time only -- Vite bakes this into the static bundle at
      # `npm run build` time, so changing it requires a rebuild, not just
      # a restart. Root cause of the CORS/"listings don't load" bug this
      # fixes: this was never set on the actual deployed frontend, so the
      # app fell back to the (previously broken) dev default and never
      # once reached the real backend.
      - key: VITE_API_BASE_URL
        value: https://rentit-backend-qo5t.onrender.com
    routes:
      # SPA fallback: React Router owns client-side routing, so any path
      # not matching a real static asset (e.g. a deep link to
      # /properties/123 or a hard refresh on it) must still serve
      # index.html rather than 404 -- the same rule Netlify's
      # frontend/public/_redirects covers for that host.
      - type: rewrite
        source: /*
        destination: /index.html
